name: Version Bump

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'Directory.Build.props'

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    outputs:
      deploy_wallet: ${{ steps.changed.outputs.deploy_wallet }}
      deploy_issuer: ${{ steps.changed.outputs.deploy_issuer }}
      deploy_verifier: ${{ steps.changed.outputs.deploy_verifier }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect changed paths
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "$CHANGED"
          echo "deploy_wallet=$(echo "$CHANGED" | grep -qE '^(WalletApp|Library)/' && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "deploy_issuer=$(echo "$CHANGED" | grep -qE '^(IssuerApp|Library)/' && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "deploy_verifier=$(echo "$CHANGED" | grep -qE '^(VerifierApp|Library)/' && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

      - name: Bump patch version in Directory.Build.props
        run: |
          FILE="Directory.Build.props"
          CURRENT=$(grep -oP '(?<=<InformationalVersion>)[^<]+' "$FILE")
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="$MAJOR.$NEW_MINOR"
          sed -i "s|<InformationalVersion>$CURRENT</InformationalVersion>|<InformationalVersion>$NEW_VERSION</InformationalVersion>|" "$FILE"
          echo "Bumped version from $CURRENT to $NEW_VERSION"

      - name: Commit updated version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Directory.Build.props
          git commit -m "chore: bump version [skip ci]"
          git push

  deploy-wallet:
    needs: bump-version
    if: needs.bump-version.outputs.deploy_wallet == 'true'
    uses: ./.github/workflows/deploy-walletapp.yml
    secrets: inherit

  deploy-issuer:
    needs: bump-version
    if: needs.bump-version.outputs.deploy_issuer == 'true'
    uses: ./.github/workflows/deploy-issuerapp.yml
    secrets: inherit

  deploy-verifier:
    needs: bump-version
    if: needs.bump-version.outputs.deploy_verifier == 'true'
    uses: ./.github/workflows/deploy-verifierapp.yml
    secrets: inherit
